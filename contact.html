<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Contact - Julissa Morales</title>
	<link rel="icon" type="image/png" href="logo4.png" />

	<style>
		:root {
			--bg-start: #e6f2f8;
			--bg-end: #f9fcff;
			--text-primary: #102a43;
			--text-secondary: #243b53;
			--text-muted: #486581;
			--surface: #ffffff;
			--surface-border: #dceefb;
			--accent: #2f6fa3;
			--shadow-soft: 0 10px 25px rgba(16, 42, 67, 0.1);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Helvetica Neue", Arial, sans-serif;
			color: var(--text-primary);
			background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
			min-height: 100vh;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		header {
			position: fixed;
			top: 0;
			width: 100%;
			box-sizing: border-box;
			padding: 18px 60px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			background: rgba(255, 255, 255, 0.92);
			backdrop-filter: blur(8px);
			box-shadow: 0 4px 12px rgba(16, 42, 67, 0.08);
			z-index: 1000;
		}

		.logo {
			font-weight: 700;
			letter-spacing: 2px;
		}

		nav {
			display: flex;
			align-items: center;
			justify-content: space-evenly;
			gap: 12px;
			flex-wrap: wrap;
			flex: 1;
			margin-left: 28px;
		}

		nav a {
			font-weight: 500;
			white-space: nowrap;
		}

		nav a.active {
			color: var(--accent);
		}

		main {
			max-width: 960px;
			margin: 0 auto;
			padding: 140px 24px 60px;
		}

		.hero {
			text-align: center;
			margin-bottom: 28px;
			opacity: 0;
			transform: translateY(20px);
			animation: reveal 0.8s ease forwards;
		}

		h1 {
			font-size: 48px;
			margin: 0 0 12px;
			letter-spacing: 0.5px;
		}

		.subtitle {
			margin: 0 auto;
			max-width: 620px;
			font-size: 19px;
			line-height: 1.6;
			color: var(--text-muted);
		}

		.contacts {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 20px;
			margin-top: 26px;
		}

		.contact-card {
			background: var(--surface);
			border: 1px solid var(--surface-border);
			border-radius: 18px;
			box-shadow: var(--shadow-soft);
			padding: 24px;
			display: flex;
			align-items: center;
			gap: 16px;
			transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
			opacity: 0;
			transform: translateY(20px);
			animation: reveal 0.8s ease forwards;
		}

		.contact-card:nth-child(2) {
			animation-delay: 0.12s;
		}

		.contact-card:hover,
		.contact-card:focus-visible {
			transform: translateY(-4px);
			border-color: #b4d7ef;
			box-shadow: 0 14px 28px rgba(16, 42, 67, 0.14);
		}

		.icon-badge {
			width: 54px;
			height: 54px;
			border-radius: 14px;
			display: grid;
			place-items: center;
			flex-shrink: 0;
			background: #edf5fb;
			color: var(--accent);
		}

		.icon-badge svg {
			width: 28px;
			height: 28px;
			display: block;
		}

		.contact-content {
			min-width: 0;
		}

		.contact-label {
			margin: 0;
			font-size: 14px;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--text-secondary);
		}

		.contact-value {
			margin: 6px 0 0;
			font-size: 20px;
			font-weight: 600;
			color: var(--text-primary);
			overflow-wrap: anywhere;
		}

		footer {
			text-align: center;
			padding: 36px 20px 46px;
			font-size: 14px;
			color: var(--text-muted);
		}

		@keyframes reveal {
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 900px) {
			header {
				padding: 14px 20px;
			}

			nav {
				justify-content: center;
				gap: 14px;
				margin-left: 0;
			}

			h1 {
				font-size: 38px;
			}

			.contacts {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>

<body>
	<header>
		<div class="logo">JM</div>
		<nav>
			<a href="index.html">Home</a>
			<a href="about.html">About</a>
			<a href="journey.html">Journey</a>
			<a href="professional.html">Professional</a>
			<a href="projects.html">Projects</a>
			<a href="contact.html" class="active">Contact</a>
		</nav>
	</header>

	<main>
		<section class="hero">
			<h1>Let's Connect</h1>
			<p class="subtitle">I am always happy to connect about opportunities, collaborations, and community-focused work.</p>
		</section>

		<section class="contacts" aria-label="Contact links">
			<a class="contact-card" href="https://www.linkedin.com/in/julissamorales" target="_blank" rel="noopener noreferrer" aria-label="Open LinkedIn profile">
				<div class="icon-badge" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="currentColor" role="img">
						<path d="M4.98 3.5A2.5 2.5 0 1 0 5 8.5a2.5 2.5 0 0 0-.02-5ZM3 9h4v12H3V9Zm7 0h3.83v1.64h.06c.53-1 1.83-2.06 3.76-2.06 4.02 0 4.76 2.64 4.76 6.08V21h-4v-5.6c0-1.34-.02-3.06-1.86-3.06-1.87 0-2.16 1.46-2.16 2.96V21h-4V9Z" />
					</svg>
				</div>
				<div class="contact-content">
					<p class="contact-label">LinkedIn</p>
					<p class="contact-value">linkedin.com/in/julissamorales</p>
				</div>
			</a>

			<a class="contact-card" href="mailto:moralesjulissa3112@gmail.com" aria-label="Send an email">
				<div class="icon-badge" aria-hidden="true">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" role="img">
						<rect x="3" y="5" width="18" height="14" rx="2"></rect>
						<path d="m4 7 8 6 8-6"></path>
					</svg>
				</div>
				<div class="contact-content">
					<p class="contact-label">Email</p>
					<p class="contact-value">moralesjulissa3112@gmail.com</p>
				</div>
			</a>
		</section>
	</main>

	<footer>
		© 2026 Julissa Morales
	</footer>
</body>
</html>
